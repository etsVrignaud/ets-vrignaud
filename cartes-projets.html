<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Projets & Budgets – ETS Vrignaud</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  font-family: Arial, sans-serif;
  background: #f9f9f9;
  margin: 0;
  padding: 0;
}

h1 {
  text-align: center;
  padding: 30px 15px;
  color: #333;
}

/* Grille et fiches */
.galerie {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

.fiche-projet {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  overflow: hidden;
  transition: transform 0.2s ease;
  cursor: pointer;
}
.fiche-projet:hover {
  transform: translateY(-5px);
}
.fiche-projet img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}
.fiche-projet .contenu {
  padding: 15px;
}
.fiche-projet h3 {
  margin: 0;
  font-size: 1.2rem;
  color: #333;
}
.fiche-projet p {
  font-size: 0.95rem;
  color: #666;
  margin: 8px 0;
}
.fiche-projet .prix {
  font-size: 1.1rem;
  font-weight: bold;
  color: #2c7a7b;
  margin-top: 10px;
}
.fiche-projet .sur-devis {
  font-size: 1rem;
  font-weight: bold;
  color: #a94442;
  margin-top: 10px;
}

/* Lightbox */
#lightbox {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(75, 54, 33, 0.9);
  justify-content: center;
  align-items: center;
}
#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border: 3px solid #D97F2C;
  border-radius: 5px;
}
#lightbox:target {
  display: flex;
}
#lightbox-close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: #FFFFFF;
  font-size: 2em;
  text-decoration: none;
}
</style>
</head>
<body>
<h1>Nos Réalisations & Budgets indicatifs</h1>

<div class="galerie" id="prix-container">
  <!-- Les fiches seront ajoutées par JS -->
</div>

<!-- Lightbox -->
<div id="lightbox">
  <a href="#" id="lightbox-close">&times;</a>
  <img src="" alt="Agrandissement">
</div>

<script>
// Données projets/prix
const projets = [
  {
    img: "images/sous-rampant.jpg",
    titre: "Meuble de rangement sur mesure en mélaminé blanc",
    desc: "Tiroirs de rangement sur coulisses et roulettes pour reprise de charges. Pose incluse.",
    prix: "entre 10 000 et 13 000 € TTC"
  },
  {
    img: "images/escalier.jpg",
    titre: "Escalier en hêtre contemporain",
    desc: "Fabrication artisanale, garde-corps métallique discret, finitions naturelles.",
    prix: null // sur devis
  },
  {
    img: "images/porte coulissante.jpg",
    titre: "Porte coulissante occultée par cloison de doublage en contreplaqué",
    desc: "Design épuré, adapté à un salon moderne. Pose incluse. Peinture à prévoir.",
    prix: "entre 8 000 et 12 000€ TTC"
  },
  {
    img: "images/photo6.jpg",
    titre: "Fenêtres bois prépeinte et imposte en forme rapportée. Doubles vitrages",
    desc: "Isolation renforcée, reproduction à l’identique de l’existant, idéal rénovation.",
    prix: "env. 4 000 TTC"
  }
];

const container = document.getElementById('prix-container');

projets.forEach(projet => {
  const fiche = document.createElement('div');
  fiche.className = 'fiche-projet';

  const img = document.createElement('img');
  img.src = projet.img;
  img.alt = projet.titre;
  img.onclick = () => openLightbox(projet.img);

  const contenu = document.createElement('div');
  contenu.className = 'contenu';

  const h3 = document.createElement('h3');
  h3.textContent = projet.titre;

  const p = document.createElement('p');
  p.textContent = projet.desc;

  contenu.appendChild(h3);
  contenu.appendChild(p);

  if(projet.prix){
    const divPrix = document.createElement('div');
    divPrix.className = 'prix';
    divPrix.textContent = projet.prix;
    contenu.appendChild(divPrix);
  } else {
    const divDevis = document.createElement('div');
    divDevis.className = 'sur-devis';
    divDevis.textContent = "Prix sur devis";
    contenu.appendChild(divDevis);
  }

  fiche.appendChild(img);
  fiche.appendChild(contenu);
  container.appendChild(fiche);
});

// Lightbox
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');

function openLightbox(src){
  lightboxImg.src = src;
  window.location.hash = "lightbox";
}

lightbox.onclick = function(e){
  if(e.target === lightbox || e.target.id === 'lightbox-close'){
    window.location.hash = "";
  }
};
</script>

</body>
</html>
